<div class="container mt-4">
  <h2>Checkout</h2>
  
  <div class="row">
    <div class="col-md-8">
      <div class="card mb-3">
        <div class="card-header bg-info text-white">
          <h5 class="mb-0">Shipping Address</h5>
        </div>
        <div class="card-body">
          <textarea class="form-control" [(ngModel)]="address" rows="3" placeholder="Enter your full address" required></textarea>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header bg-info text-white">
          <h5 class="mb-0">Payment Method</h5>
        </div>
        <div class="card-body">
          <div class="form-check">
            <input type="radio" class="form-check-input" value="cod" [(ngModel)]="paymentMethod" id="cod">
            <label class="form-check-label" for="cod">Cash on Delivery (COD)</label>
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-md-4">
      <div class="card">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Order Summary</h5>
        </div>
        <div class="card-body">
          <p><strong>Total Items:</strong> {{cartService.getCartCount()}}</p>
          <hr>
          <h4 class="text-primary">Total: ${{cartService.getCartTotal()}}</h4>
          <button (click)="placeOrder()" class="btn btn-success w-100 mt-3" [disabled]="!address">Place Order</button>
        </div>
      </div>
    </div>
  </div>
</div>
