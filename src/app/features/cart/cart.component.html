<div class="container mt-4">
  <h2>Shopping Cart</h2>
  
  <div *ngIf="cartItems.length === 0" class="alert alert-info text-center p-5">
    <h4>Your cart is empty</h4>
    <a routerLink="/products" class="btn btn-primary">Continue Shopping</a>
  </div>
  
  <div *ngIf="cartItems.length > 0">
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr><th>Product</th><th>Price</th><th>Quantity</th><th>Total</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems">
          <td>
            <img [src]="item.imageUrl" style="width: 50px; height: 50px;" class="me-2">
            {{item.name}}
          </td>
          <td>${{item.price}}</td>
          <td><input type="number" class="form-control" style="width: 80px;" [(ngModel)]="item.quantity" (change)="updateQuantity(item)" min="1"></td>
          <td>${{item.price * item.quantity}}</td>
          <td><button (click)="removeItem(item.productId)" class="btn btn-danger btn-sm">Remove</button></td>
        </tr>
      </tbody>
      <tfoot class="table-light">
        <tr><td colspan="3" class="text-end"><strong>Total:</strong></td><td colspan="2"><strong class="h4 text-primary">${{getTotal()}}</strong></td></tr>
      </tfoot>
    </table>
    
    <div class="d-flex justify-content-between">
      <a routerLink="/products" class="btn btn-secondary">Continue Shopping</a>
      <button (click)="checkout()" class="btn btn-success btn-lg">Proceed to Checkout</button>
    </div>
  </div>
</div>
