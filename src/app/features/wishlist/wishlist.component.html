<div class="container mt-4">
  <h2>My Wishlist</h2>
  
  <div *ngIf="wishlistItems.length === 0" class="alert alert-info text-center p-5">
    <h4>Your wishlist is empty</h4>
    <a routerLink="/products" class="btn btn-primary">Browse Products</a>
  </div>
  
  <div class="row">
    <div class="col-md-3 mb-4" *ngFor="let item of wishlistItems">
      <div class="card h-100 shadow-sm">
        <img [src]="item.product.imageUrl" class="card-img-top" style="height: 200px; object-fit: cover;">
        <div class="card-body">
          <h5 class="card-title">{{item.product.name}}</h5>
          <p class="card-text text-primary h5">${{item.product.price}}</p>
          <a [routerLink]="['/products', item.productId]" class="btn btn-outline-primary btn-sm w-100 mb-2">View Product</a>
          <button (click)="remove(item.productId)" class="btn btn-danger btn-sm w-100">Remove</button>
        </div>
      </div>
    </div>
  </div>
</div>
