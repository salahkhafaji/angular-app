<div class="container mt-4">
  <h2>My Products</h2>
  <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addProductModal">+ Add New Product</button>
  
  <table class="table table-bordered">
    <thead class="table-dark">
      <tr><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{product.name}}</td><td>${{product.price}}</td><td>{{product.stock}}</td>
        <td><button class="btn btn-danger btn-sm" (click)="deleteProduct(product.id)">Delete</button></td>
      </tr>
    </tbody>
  </table>
  
  <div class="modal fade" id="addProductModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5>Add Product</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="text" class="form-control mb-2" [(ngModel)]="newProduct.name" placeholder="Product Name">
        <textarea class="form-control mb-2" [(ngModel)]="newProduct.description" placeholder="Description"></textarea>
        <input type="number" class="form-control mb-2" [(ngModel)]="newProduct.price" placeholder="Price">
        <input type="text" class="form-control mb-2" [(ngModel)]="newProduct.category" placeholder="Category">
        <input type="number" class="form-control mb-2" [(ngModel)]="newProduct.stock" placeholder="Stock">
        <input type="text" class="form-control mb-2" [(ngModel)]="newProduct.imageUrl" placeholder="Image URL">
      </div>
      <div class="modal-footer"><button class="btn btn-primary" (click)="addProduct()" data-bs-dismiss="modal">Add Product</button></div>
    </div></div>
  </div>
</div>
