<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h3 class="mb-0">Register</h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label>Full Name</label>
                <input type="text" class="form-control" [(ngModel)]="user.name" name="name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" class="form-control" [(ngModel)]="user.email" name="email" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Phone</label>
                <input type="text" class="form-control" [(ngModel)]="user.phone" name="phone" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Password</label>
                <input type="password" class="form-control" [(ngModel)]="user.password" name="password" required>
              </div>
              <div class="col-12 mb-3">
                <label>Address</label>
                <textarea class="form-control" [(ngModel)]="user.address" name="address" rows="2" required></textarea>
              </div>
              <div class="col-md-6 mb-3">
                <label>Register as</label>
                <select class="form-control" [(ngModel)]="user.role" name="role">
                  <option value="customer">Customer</option>
                  <option value="seller">Seller</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-success w-100">Register</button>
            <div class="text-center mt-3">
              <a routerLink="/login" class="text-decoration-none">Already have an account? Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
