<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">🔐 Login to Your Account</h3>
        </div>
        <div class="card-body">
          <div *ngIf="error" class="alert alert-danger">{{error}}</div>
          
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Login</button>
            <div class="text-center mt-3">
              <a routerLink="/register" class="text-decoration-none">Don't have an account? Register</a>
            </div>
          </form>
          
          <div class="mt-4 p-3 bg-light rounded">
            <h6>Test Accounts:</h6>
            <small>📧 customer@test.com / customer123 (Customer)</small><br>
            <small>📧 seller@test.com / seller123 (Seller)</small><br>
            <small>📧 admin@test.com / admin123 (Admin)</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
